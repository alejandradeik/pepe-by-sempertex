[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

# Netlify auto-detects Next.js and aplica el runtime correcto.
# Las variables de entorno se agregan en Site Settings > Environment variables:
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
